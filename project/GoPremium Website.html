<head>

<title>GO PREMIUM — ของขวัญองค์กรดีไซน์เฉพาะ ขับเคลื่อนด้วย AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  #root{min-height:100vh;}
  /* responsive collapses */
  @media (max-width:900px){
    .gp-hero-split{grid-template-columns:1fr !important;}
    .gp-hero-split > div:last-child{display:none;}
    .gp-hero-ed{grid-template-columns:1fr !important;}
    .gp-prod-grid{grid-template-columns:1fr !important;}
    .gp-rfq-left ~ div, #rfq .gp-wrap{grid-template-columns:1fr !important;}
    #rfq .gp-wrap{grid-template-columns:1fr !important;}
    .gp-foot-grid{grid-template-columns:1fr 1fr !important;gap:26px !important;}
    .gp-masonry{column-count:2 !important;}
  }
  @media (max-width:760px){
    .gp-nav-links{display:none !important;}
    .gp-nav-burger{display:block !important;}
  }
  @media (max-width:560px){
    .gp-foot-grid{grid-template-columns:1fr !important;}
    .gp-masonry{column-count:1 !important;}
  }
</style>
</head>
<body>
<div id="root"></div>
